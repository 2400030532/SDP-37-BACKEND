spring:
  application:
    name: easyintern-api

  # JPA/Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        "[format_sql]": true

  # Datasource Configuration (MySQL)
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/easyintern?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:easyintern}
    password: ${SPRING_DATASOURCE_PASSWORD:easyintern123}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Security
  security:
    user:
      name: admin
      password: admin

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${PORT:8080}
  error:
    include-message: always

app:
  jwt:
    secret: ${APP_JWT_SECRET:SGVsbG9FYXN5SW50ZXJuSldUU2VjcmV0S2V5MTIzNDU2Nzg5MDEyMzQ1Njc4OTA=}
    expiration-ms: ${APP_JWT_EXPIRATION_MS:86400000}

# Logging
logging:
  level:
    root: INFO
    "[com.easyintern]": DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
