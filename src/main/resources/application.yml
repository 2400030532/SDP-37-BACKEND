spring:
  application:
    name: easyintern-api
  
  # JPA/Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: ${JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  
  # Datasource Configuration (MySQL)
  datasource:
    url: ${DATABASE_URL:jdbc:mysql://localhost:3306/easyintern?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DATABASE_USER:easyintern}
    password: ${DATABASE_PASSWORD:easyintern123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  # Security
  security:
    user:
      name: ${ADMIN_USERNAME:admin}
      password: ${ADMIN_PASSWORD:admin}

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api/v1

# Logging
logging:
  level:
    root: INFO
    com.easyintern: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
