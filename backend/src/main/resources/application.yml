spring:
  application:
    name: easyintern-api
  
  # JPA/Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
      dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  
  # Datasource Configuration (MySQL)
  datasource:
    url: jdbc:mysql://localhost:3306/easyintern?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: easyintern
    password: easyintern123
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  # Security
  security:
    user:
      name: admin
      password: admin

server:
  port: ${PORT:8080}

# Logging
logging:
  level:
    root: INFO
    com.easyintern: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
